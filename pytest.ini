[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwchat_core: Core functionality and integration tests
    xwchat_unit: Unit tests for individual components
    xwchat_integration: Integration tests across modules
    xwchat_advance: Advance quality tests (v1.0.0+)
    xwchat_security: Security excellence tests (Priority #1)
    xwchat_usability: Usability excellence tests (Priority #2)
    xwchat_maintainability: Maintainability excellence tests (Priority #3)
    xwchat_performance: Performance excellence tests (Priority #4)
    xwchat_extensibility: Extensibility excellence tests (Priority #5)

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

# Warnings are treated as test failures via `-W error` in CI/dev runs.
# This project avoids importing optional provider SDKs at import time so third-party
# deprecations don't break unrelated usage/tests.
